<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drishtikon - Demo (Steps 1-7)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .status-badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .search-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        .results {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .results h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            color: #6b7280;
            margin-top: 5px;
        }
        
        .article {
            background: #f9fafb;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .article:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .article h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .article-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .source {
            color: #667eea;
            font-weight: 600;
        }
        
        .bias-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .bias-left { background: #bfdbfe; color: #1e40af; }
        .bias-center-left { background: #ddd6fe; color: #5b21b6; }
        .bias-center { background: #e5e7eb; color: #374151; }
        .bias-center-right { background: #fed7aa; color: #9a3412; }
        .bias-right { background: #fecaca; color: #991b1b; }
        .bias-unknown { background: #f3f4f6; color: #6b7280; }
        
        .article a {
            color: #667eea;
            text-decoration: none;
        }
        
        .article a:hover {
            text-decoration: underline;
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #dc2626;
        }
        
        /* Cluster Styles */
        .clusters-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 30px;
        }
        
        .cluster {
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .cluster:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }
        
        .cluster-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .cluster-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        
        .cluster-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .cluster-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge-size {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-consensus {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-consensus-low {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .cluster-summary {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-style: italic;
            color: #374151;
            border-left: 3px solid #667eea;
        }
        
        .cluster-claims {
            margin-top: 15px;
        }
        
        .cluster-claim {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #10b981;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 10px;
        }
        
        .claim-text {
            flex: 1;
            color: #1f2937;
        }
        
        .claim-meta {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .source-tag {
            font-size: 0.75em;
            padding: 3px 8px;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 10px;
            white-space: nowrap;
        }
        
        .toggle-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .toggle-btn:hover {
            background: #5568d3;
        }
        
        .collapsed {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Drishtikon</h1>
            <p>Multi-Perspective News Analysis</p>
            <span class="status-badge">✅ Steps 1-7 Complete</span>
        </div>
        
        <div class="search-box">
            <h2>Analyze a Topic</h2>
            <div class="input-group">
                <input 
                    type="text" 
                    id="topicInput" 
                    placeholder="Enter a topic (e.g., climate change, artificial intelligence, economy)"
                    value="climate change"
                />
                <button id="analyzeBtn" onclick="analyzeTopic()">Analyze</button>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <div>🔄 Fetching articles and analyzing bias...</div>
        </div>
        
        <div id="results" style="display: none;"></div>
        
        <div id="consensus" style="display: none;"></div>
        
        <div id="clusters" style="display: none;"></div>
    </div>
    
    <script>
        async function analyzeTopic() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('Please enter a topic to analyze');
                return;
            }
            
            const loadingDiv = document.getElementById('loading');
            const resultsDiv = document.getElementById('results');
            const analyzeBtn = document.getElementById('analyzeBtn');
            
            // Show loading
            loadingDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            analyzeBtn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:8001/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ topic: topic })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    displayResults(data.data);
                } else {
                    displayError(data.message || 'An error occurred');
                }
            } catch (error) {
                displayError('Failed to connect to API: ' + error.message);
            } finally {
                loadingDiv.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const clustersDiv = document.getElementById('clusters');
            
            // Count bias distribution
            const biasCount = {};
            data.articles.forEach(article => {
                biasCount[article.bias] = (biasCount[article.bias] || 0) + 1;
            });
            
            let html = `
                <h2>Results for: "${data.topic}"</h2>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="number">${data.article_count}</div>
                        <div class="label">Articles</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.total_claims || 0}</div>
                        <div class="label">Claims Extracted</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.total_clusters || 0}</div>
                        <div class="label">Clusters</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.embeddings_stored || 0}</div>
                        <div class="label">Embeddings Stored</div>
                    </div>
                </div>
                
                <h3 style="margin: 30px 0 15px 0;">Articles:</h3>
            `;
            
            data.articles.forEach(article => {
                const biasClass = `bias-${article.bias}`;
                html += `
                    <div class="article">
                        <h3>${article.title}</h3>
                        <div class="article-meta">
                            <span class="source">${article.source}</span>
                            <span class="bias-badge ${biasClass}">${article.bias.toUpperCase()}</span>
                            <span style="color: #6b7280;">${article.content_length} chars</span>
                            <span style="color: #667eea; font-weight: 600;">💎 ${article.claims_count} claims</span>
                        </div>
                        <div style="margin-top: 10px; padding-left: 15px;">
                            ${article.claims.map((claim, idx) => `
                                <div style="margin: 5px 0; color: #374151;">
                                    <strong>${idx + 1}.</strong> ${claim}
                                </div>
                            `).join('')}
                        </div>
                        <a href="${article.url}" target="_blank">Read article →</a>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
            resultsDiv.style.display = 'block';
            
            // Display consensus analysis
            if (data.consensus_claims || data.disagreement_claims) {
                displayConsensus(data);
            }
            
            // Display clusters
            if (data.clusters && data.clusters.length > 0) {
                displayClusters(data);
            }
        }
        
        function displayConsensus(data) {
            const consensusDiv = document.getElementById('consensus');
            
            const consensusCount = data.consensus_claims?.length || 0;
            const disagreementCount = data.disagreement_claims?.length || 0;
            const totalCount = consensusCount + disagreementCount;
            const consensusPercentage = totalCount > 0 ? ((consensusCount / totalCount) * 100).toFixed(1) : 0;
            
            let html = `
                <h2>🎯 Step 7: Consensus Analysis</h2>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="number">${consensusCount}</div>
                        <div class="label">Consensus Claims</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${disagreementCount}</div>
                        <div class="label">Disagreements</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${consensusPercentage}%</div>
                        <div class="label">Agreement Rate</div>
                    </div>
                </div>
                
                <p style="margin: 20px 0; color: #6b7280;">
                    Claims are classified as "consensus" when supported by multiple sources with diverse biases, 
                    or "disagreement" when coverage is limited or biased.
                </p>
            `;
            
            // Display consensus claims
            if (data.consensus_claims && data.consensus_claims.length > 0) {
                html += `
                    <div style="margin: 30px 0;">
                        <h3 style="color: #10b981; margin-bottom: 15px;">✅ Widely Agreed Upon (Consensus)</h3>
                        <p style="margin-bottom: 15px; color: #6b7280; font-size: 0.95em;">
                            These claims are supported by multiple sources across different bias perspectives:
                        </p>
                `;
                
                data.consensus_claims.forEach((claim, idx) => {
                    html += `
                        <div class="cluster" style="border-left: 4px solid #10b981;">
                            <div style="color: #10b981; font-weight: 600; margin-bottom: 8px;">
                                Consensus ${idx + 1}
                            </div>
                            <div style="font-size: 1.05em; line-height: 1.6;">
                                ${claim}
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // Display disagreement claims
            if (data.disagreement_claims && data.disagreement_claims.length > 0) {
                html += `
                    <div style="margin: 30px 0;">
                        <h3 style="color: #f59e0b; margin-bottom: 15px;">⚠️ Limited Agreement (Disagreement)</h3>
                        <p style="margin-bottom: 15px; color: #6b7280; font-size: 0.95em;">
                            These claims need more verification - limited sources or single bias perspective:
                        </p>
                `;
                
                data.disagreement_claims.forEach((claim, idx) => {
                    html += `
                        <div class="cluster" style="border-left: 4px solid #f59e0b;">
                            <div style="color: #f59e0b; font-weight: 600; margin-bottom: 8px;">
                                Limited ${idx + 1}
                            </div>
                            <div style="font-size: 1.05em; line-height: 1.6;">
                                ${claim}
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            consensusDiv.innerHTML = html;
            consensusDiv.style.display = 'block';
        }
        
        function displayClusters(data) {
            const clustersDiv = document.getElementById('clusters');
            
            let html = `
                <h2>🧠 Claim Clusters (Step 6: Intelligent Clustering)</h2>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="number">${data.cluster_stats?.total_clusters || 0}</div>
                        <div class="label">Total Clusters</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.cluster_stats?.avg_cluster_size || 0}</div>
                        <div class="label">Avg Cluster Size</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.cluster_stats?.largest_cluster || 0}</div>
                        <div class="label">Largest Cluster</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.cluster_stats?.consensus_clusters || 0}</div>
                        <div class="label">High Consensus</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.cluster_stats?.disagreement_clusters || 0}</div>
                        <div class="label">Disagreements</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.cluster_stats?.avg_consensus_level || 0}</div>
                        <div class="label">Avg Consensus</div>
                    </div>
                </div>
                
                <p style="margin: 20px 0; color: #6b7280;">
                    Similar claims have been grouped using intelligent clustering (Pinecone similarity + Union-Find merging).
                    Consensus level indicates agreement across sources and biases.
                </p>
            `;
            
            data.clusters.forEach((cluster, idx) => {
                const consensusClass = cluster.consensus_level >= 0.6 ? 'badge-consensus' : 'badge-consensus-low';
                const consensusText = cluster.consensus_level >= 0.6 ? 'High Consensus' : 'Low Consensus';
                
                html += `
                    <div class="cluster">
                        <div class="cluster-header">
                            <div class="cluster-title">
                                🔗 Cluster ${cluster.cluster_id + 1}
                            </div>
                            <div class="cluster-badges">
                                <span class="cluster-badge badge-size">
                                    ${cluster.size} claim${cluster.size > 1 ? 's' : ''}
                                </span>
                                <span class="cluster-badge ${consensusClass}">
                                    ${consensusText}: ${cluster.consensus_level}
                                </span>
                            </div>
                        </div>
                        
                        <div class="cluster-summary">
                            <strong>📌 Summary:</strong> ${cluster.summary}
                        </div>
                        
                        <div style="margin-bottom: 10px;">
                            <strong>Sources:</strong> 
                            ${cluster.sources.map(s => `<span class="source-tag">${s}</span>`).join(' ')}
                        </div>
                        
                        <div style="margin-bottom: 15px;">
                            <strong>Biases:</strong> 
                            ${cluster.biases.map(b => `<span class="bias-badge bias-${b}" style="margin-right: 5px;">${b.toUpperCase()}</span>`).join('')}
                        </div>
                        
                        <button class="toggle-btn" onclick="toggleCluster(${idx})">
                            <span id="toggle-text-${idx}">Show Claims</span>
                        </button>
                        
                        <div id="cluster-claims-${idx}" class="cluster-claims collapsed">
                            ${cluster.claims.map((claim, claimIdx) => `
                                <div class="cluster-claim">
                                    <div class="claim-text">
                                        <strong>${claimIdx + 1}.</strong> ${claim}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            clustersDiv.innerHTML = html;
            clustersDiv.style.display = 'block';
        }
        
        function toggleCluster(idx) {
            const claimsDiv = document.getElementById(`cluster-claims-${idx}`);
            const toggleText = document.getElementById(`toggle-text-${idx}`);
            
            if (claimsDiv.classList.contains('collapsed')) {
                claimsDiv.classList.remove('collapsed');
                toggleText.textContent = 'Hide Claims';
            } else {
                claimsDiv.classList.add('collapsed');
                toggleText.textContent = 'Show Claims';
            }
        }
        
        function displayError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${message}
                </div>
            `;
            resultsDiv.style.display = 'block';
        }
        
        // Allow Enter key to submit
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeTopic();
            }
        });
    </script>
</body>
</html>
